# ailiance-demo deployment on electron-server
#
# Hosts:
#   - ailiance.fr        → public vitrine (Cloudflare proxied)
#   - admin.ailiance.fr  → admin (Cloudflare DNS-only / grey, points to
#                             electron-server's Tailscale IP — only tailnet
#                             members can resolve+reach it).
#
# Run from repo root:
#   docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build
#
# Required: external Docker network `traefik` must exist (Traefik 3 already
# running on electron-server with cert resolver `letsencrypt`).
name: ailiance-demo

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  api:
    <<: [*restart, *logging]
    build:
      context: ..
      dockerfile: Dockerfile
      target: api
    image: ailiance-demo-api:${TAG:-latest}
    environment:
      COCKPIT_HOST: 0.0.0.0
      COCKPIT_PORT: 9100
      COCKPIT_LOG_LEVEL: ${COCKPIT_LOG_LEVEL:-INFO}
      # ailiance gateway lives on the same host (electron-server) — co-located
      # so chat proxy never crosses the public internet.
      COCKPIT_AILIANCE_GATEWAY_URL: ${COCKPIT_AILIANCE_GATEWAY_URL:-http://host.docker.internal:9300}
      # Workers are pinged via Tailscale Magic DNS — same network agent-kiki
      # uses (see cli/src/utils/ailiance-default.ts).
      COCKPIT_HF_TOKEN: ${HF_TOKEN:-}
      # Training logs are rsync'd from Studio + macm1 to /home/electron/training-logs
      # on electron-server (cron, sync-training-logs.sh) and bind-mounted here.
      COCKPIT_TRAINING_LOG_ROOTS: '["/training-logs/studio","/training-logs/macm1"]'
      COCKPIT_COLLECTOR_BASE_URL: ${COCKPIT_COLLECTOR_BASE_URL:-http://collector:9150}
    extra_hosts:
      # Lets the container reach the host's :9300 gateway and the Tailscale
      # Magic DNS names through the host network resolver.
      - "host.docker.internal:host-gateway"
    volumes:
      - /home/electron/training-logs:/training-logs:ro
      - /home/electron/datasets:/datasets:ro
      - /home/electron/.ssh:/root/.ssh:ro
      - /home/electron/dataset-flags:/dataset-flags:rw
    networks:
      - traefik
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.services.kiki-api.loadbalancer.server.port=9100"
      # public host: /api → api
      - "traefik.http.routers.kiki-api-public.rule=(Host(`ailiance.fr`) || Host(`www.ailiance.fr`) || Host(`ml.saillant.cc`)) && PathPrefix(`/api`)"
      - "traefik.http.routers.kiki-api-public.entrypoints=websecure"
      - "traefik.http.routers.kiki-api-public.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.routers.kiki-api-public.service=kiki-api"
      # admin host: /api → api (same backend, admin endpoints reachable here)
      - "traefik.http.routers.kiki-api-admin.rule=(Host(`admin.ailiance.fr`) || Host(`admin.ml.saillant.cc`)) && PathPrefix(`/api`)"
      # admin host is reachable only from the tailnet (grey-cloud DNS) — inject
      # a static X-Tailscale-User header so the FastAPI dependency passes.
      - "traefik.http.middlewares.kiki-admin-tsuser.headers.customRequestHeaders.X-Tailscale-User=tailnet-member"
      - "traefik.http.routers.kiki-api-admin.entrypoints=websecure"
      - "traefik.http.routers.kiki-api-admin.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.routers.kiki-api-admin.service=kiki-api"
      # Rate-limit: 30 requests / minute / source IP, burst 10
      - "traefik.http.middlewares.kiki-api-ratelimit.ratelimit.average=30"
      - "traefik.http.middlewares.kiki-api-ratelimit.ratelimit.period=1m"
      - "traefik.http.middlewares.kiki-api-ratelimit.ratelimit.burst=10"
      - "traefik.http.middlewares.kiki-api-ratelimit.ratelimit.sourceCriterion.ipStrategy.depth=1"
      - "traefik.http.routers.kiki-api-public.middlewares=kiki-api-ratelimit"
      - "traefik.http.routers.kiki-api-admin.middlewares=kiki-api-ratelimit,kiki-admin-tsuser"

  public:
    <<: [*restart, *logging]
    build:
      context: ..
      dockerfile: Dockerfile
      target: public
      args:
        # Empty: SPA hooks already include the /api/ prefix in their fetch
        # paths (see useModels.ts, useTrainingRuns.ts, etc.).
        VITE_API_BASE_URL: ""
    image: ailiance-demo-public:${TAG:-latest}
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.services.kiki-public.loadbalancer.server.port=80"
      - "traefik.http.routers.kiki-public.rule=Host(`ailiance.fr`) || Host(`www.ailiance.fr`) || Host(`ml.saillant.cc`)"
      - "traefik.http.routers.kiki-public.entrypoints=websecure"
      - "traefik.http.routers.kiki-public.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.routers.kiki-public.service=kiki-public"
      - "traefik.http.routers.kiki-public.priority=1"

  collector:
    <<: [*restart, *logging]
    build:
      context: collector
      dockerfile: Dockerfile
    image: ailiance-collector:${TAG:-latest}
    environment:
      COLLECTOR_HOST: 0.0.0.0
      COLLECTOR_PORT: 9150
      COLLECTOR_MACHINE_LABEL: hub
      COLLECTOR_TRAINING_LOG_ROOTS: '["/training-logs/studio","/training-logs/macm1"]'
      COLLECTOR_EVAL_RESULTS_ROOT: /eval-results
    volumes:
      - /home/electron/training-logs:/training-logs:ro
      - /home/electron/eval-results:/eval-results:ro
    networks:
      - default

  admin:
    <<: [*restart, *logging]
    build:
      context: ..
      dockerfile: Dockerfile
      target: admin
      args:
        # Empty: SPA hooks already include the /api/ prefix in their fetch
        # paths (see useModels.ts, useTrainingRuns.ts, etc.).
        VITE_API_BASE_URL: ""
    image: ailiance-demo-admin:${TAG:-latest}
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.services.kiki-admin.loadbalancer.server.port=80"
      - "traefik.http.routers.kiki-admin.rule=Host(`admin.ailiance.fr`) || Host(`admin.ml.saillant.cc`)"
      - "traefik.http.routers.kiki-admin.entrypoints=websecure"
      - "traefik.http.routers.kiki-admin.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.routers.kiki-admin.service=kiki-admin"
      - "traefik.http.routers.kiki-admin.priority=1"

networks:
  traefik:
    external: true
  default:
    driver: bridge
